News Wave Auto Post

on:
  schedule:
    - cron: '30 1 * * *'
    - cron: '30 7 * * *'
    - cron: '30 12 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-and-post:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Fetch news and generate posts
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node fetch-news.js

      - name: Save posts to repo
        run: |
          git config --global user.name "NewsWave Bot"
          git config --global user.email "bot@newswave.com"
          git add posts.json
          git diff --staged --quiet || git commit -m "Auto news: $(date '+%d %b %Y %H:%M IST')"
          git push
